{% extends "base.html" %}
{% block title %}Catalogs{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Supplier Catalogs</h1>
  <button class="btn btn-primary" onclick="showAddSupplier()">+ Add Supplier</button>
</div>

<div id="suppliers-list" class="suppliers-grid"></div>

<!-- Add Supplier Modal -->
<div id="modal-add-supplier" class="modal hidden">
  <div class="modal-box">
    <h3>Add Supplier</h3>
    <label>Supplier / Company Name</label>
    <input type="text" id="new-supplier-name" class="input" placeholder="e.g. Havells, Polycab…" />
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('modal-add-supplier')">Cancel</button>
      <button class="btn btn-primary" onclick="addSupplier()">Add</button>
    </div>
  </div>
</div>

<!-- Upload Catalog Modal -->
<div id="modal-upload" class="modal hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="upload-modal-title">Upload Catalog</h3>
      <button class="btn-icon" onclick="closeModal('modal-upload')">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;margin-top:8px">
      <div class="form-group">
        <label>Catalog Name</label>
        <input type="text" id="upload-catalog-name" class="input" placeholder="e.g. Wires & Cables 2025, Switchgear Catalog…" />
      </div>
      <div class="form-group">
        <label>PDF File</label>
        <input type="file" id="upload-file-input" class="input" accept=".pdf" />
      </div>
      <div id="upload-progress" class="upload-status"></div>
    </div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn btn-outline" onclick="closeModal('modal-upload')">Cancel</button>
      <button class="btn btn-primary" id="upload-confirm-btn" onclick="doUpload()">Upload & Parse</button>
    </div>
  </div>
</div>

<!-- Items Modal -->
<div id="modal-items" class="modal hidden">
  <div class="modal-box modal-wide">
    <div class="modal-header">
      <h3 id="modal-items-title">Items</h3>
      <button class="btn-icon" onclick="closeModal('modal-items')">✕</button>
    </div>
    <div class="toolbar">
      <input type="text" id="items-search" class="input" placeholder="Search items…" oninput="filterItems()" />
    </div>
    <div class="table-wrap">
      <table class="data-table" id="items-table">
        <thead>
          <tr><th>Code</th><th>Description</th><th>Unit</th><th>Price (₹)</th><th>Catalog</th><th></th></tr>
        </thead>
        <tbody id="items-tbody"></tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
let allItems = [];
let currentSupplierId = null;
let uploadSupplierId = null;
let uploadCatalogId = null; // set when re-uploading existing catalog

async function loadSuppliers() {
  const suppliers = await fetch('/api/suppliers').then(r => r.json());
  const el = document.getElementById('suppliers-list');
  if (!suppliers.length) {
    el.innerHTML = '<div class="empty-state">No suppliers yet. Add one to get started.</div>';
    return;
  }

  // Load catalogs for each supplier in parallel
  const catalogsAll = await Promise.all(
    suppliers.map(s => fetch(`/api/suppliers/${s.id}/catalogs`).then(r => r.json()))
  );

  el.innerHTML = suppliers.map((s, idx) => {
    const catalogs = catalogsAll[idx];
    const catalogRows = catalogs.map(c => `
      <div class="catalog-row">
        <div class="catalog-info">
          <span class="catalog-name">📄 ${esc(c.name)}</span>
          <span class="catalog-meta">${c.item_count} items · ${c.uploaded_at.split('T')[0] || c.uploaded_at.substring(0,10)}</span>
        </div>
        <div class="catalog-actions">
          <label class="btn btn-sm btn-outline upload-btn" title="Re-upload to update prices">
            ↺ Update
            <input type="file" accept=".pdf" style="display:none"
              onchange="showReuploadModal(${s.id}, '${s.name}', ${c.id}, '${esc(c.name)}', this)" />
          </label>
          <button class="btn btn-sm btn-danger" onclick="deleteCatalog(${c.id}, '${esc(c.name)}')">Delete</button>
        </div>
      </div>
    `).join('') || '<div class="catalog-empty">No catalogs yet</div>';

    return `
      <div class="supplier-card">
        <div class="supplier-header">
          <div class="supplier-icon">⚡</div>
          <div style="flex:1">
            <div class="supplier-name">${esc(s.name)}</div>
            <div class="supplier-meta">${s.item_count} items across ${catalogs.length} catalog${catalogs.length !== 1 ? 's' : ''}</div>
          </div>
          <button class="btn btn-sm btn-danger" onclick="deleteSupplier(${s.id}, '${esc(s.name)}')" title="Delete supplier">✕</button>
        </div>

        <div class="catalogs-list">${catalogRows}</div>

        <div class="supplier-footer">
          <button class="btn btn-sm btn-primary" onclick="showUploadModal(${s.id}, '${esc(s.name)}')">+ Add Catalog</button>
          <button class="btn btn-sm" onclick="viewItems(${s.id}, '${esc(s.name)}')">View All Items</button>
        </div>
      </div>
    `;
  }).join('');
}

function showAddSupplier() {
  document.getElementById('new-supplier-name').value = '';
  showModal('modal-add-supplier');
  setTimeout(() => document.getElementById('new-supplier-name').focus(), 100);
}

async function addSupplier() {
  const name = document.getElementById('new-supplier-name').value.trim();
  if (!name) return;
  const r = await fetch('/api/suppliers', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name})
  });
  const data = await r.json();
  if (data.error) { alert(data.error); return; }
  closeModal('modal-add-supplier');
  loadSuppliers();
}

async function deleteSupplier(id, name) {
  if (!confirm(`Delete "${name}" and all its catalogs and items?`)) return;
  await fetch(`/api/suppliers/${id}`, {method: 'DELETE'});
  loadSuppliers();
}

async function deleteCatalog(cid, name) {
  if (!confirm(`Delete catalog "${name}" and all its items?`)) return;
  await fetch(`/api/catalogs/${cid}`, {method: 'DELETE'});
  loadSuppliers();
}

function showUploadModal(sid, sname) {
  uploadSupplierId = sid;
  uploadCatalogId = null;
  document.getElementById('upload-modal-title').textContent = `Add Catalog — ${sname}`;
  document.getElementById('upload-catalog-name').value = '';
  document.getElementById('upload-file-input').value = '';
  document.getElementById('upload-progress').innerHTML = '';
  document.getElementById('upload-confirm-btn').disabled = false;
  showModal('modal-upload');
  setTimeout(() => document.getElementById('upload-catalog-name').focus(), 100);
}

function showReuploadModal(sid, sname, cid, cname, fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  uploadSupplierId = sid;
  uploadCatalogId = cid;
  document.getElementById('upload-modal-title').textContent = `Update Catalog — ${sname}`;
  document.getElementById('upload-catalog-name').value = cname;
  // Programmatically set the file in the modal's input
  const dt = new DataTransfer();
  dt.items.add(file);
  document.getElementById('upload-file-input').files = dt.files;
  document.getElementById('upload-progress').innerHTML = '';
  document.getElementById('upload-confirm-btn').disabled = false;
  fileInput.value = '';
  showModal('modal-upload');
}

async function doUpload() {
  const file = document.getElementById('upload-file-input').files[0];
  const catalogName = document.getElementById('upload-catalog-name').value.trim();
  if (!file) { alert('Please select a PDF file.'); return; }
  if (!catalogName) { alert('Please enter a catalog name.'); return; }

  const progress = document.getElementById('upload-progress');
  const btn = document.getElementById('upload-confirm-btn');
  progress.innerHTML = '<span class="uploading">⏳ Reading catalog with AI… this may take 30–60 seconds</span>';
  btn.disabled = true;

  const fd = new FormData();
  fd.append('file', file);
  fd.append('catalog_name', catalogName);
  if (uploadCatalogId) fd.append('catalog_id', uploadCatalogId);

  try {
    const r = await fetch(`/api/suppliers/${uploadSupplierId}/upload`, {method: 'POST', body: fd});
    const data = await r.json();
    if (data.error) {
      progress.innerHTML = `<span class="error-text">❌ ${data.error}</span>`;
      btn.disabled = false;
    } else {
      progress.innerHTML = `<span class="success-text">✅ Imported ${data.imported} items</span>`;
      setTimeout(() => { closeModal('modal-upload'); loadSuppliers(); }, 800);
    }
  } catch(e) {
    progress.innerHTML = '<span class="error-text">❌ Upload failed</span>';
    btn.disabled = false;
  }
}

async function viewItems(sid, name) {
  currentSupplierId = sid;
  document.getElementById('modal-items-title').textContent = `${name} — All Items`;
  document.getElementById('items-search').value = '';
  showModal('modal-items');
  const items = await fetch(`/api/suppliers/${sid}/items`).then(r => r.json());
  allItems = items;
  renderItems(items);
}

function filterItems() {
  const q = document.getElementById('items-search').value.toLowerCase();
  renderItems(allItems.filter(i =>
    i.description.toLowerCase().includes(q) || (i.code || '').toLowerCase().includes(q)
  ));
}

function renderItems(items) {
  const tbody = document.getElementById('items-tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">No items found</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(i => `
    <tr id="item-row-${i.id}">
      <td><input class="input-inline" value="${esc(i.code||'')}" onchange="updateItem(${i.id},'code',this.value)" /></td>
      <td><input class="input-inline wide" value="${esc(i.description)}" onchange="updateItem(${i.id},'description',this.value)" /></td>
      <td><input class="input-inline narrow" value="${esc(i.unit||'Nos')}" onchange="updateItem(${i.id},'unit',this.value)" /></td>
      <td><input class="input-inline narrow right" type="number" step="0.01" value="${i.base_price}" onchange="updateItem(${i.id},'base_price',this.value)" /></td>
      <td style="font-size:11px;color:#888">${esc(i.catalog_name||'—')}</td>
      <td><button class="btn-icon danger" onclick="deleteItem(${i.id})">✕</button></td>
    </tr>
  `).join('');
}

async function updateItem(id, field, value) {
  const row = allItems.find(i => i.id === id);
  if (!row) return;
  row[field] = field === 'base_price' ? parseFloat(value) : value;
  await fetch(`/api/items/${id}`, {
    method: 'PUT', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(row)
  });
}

async function deleteItem(id) {
  if (!confirm('Remove this item?')) return;
  await fetch(`/api/items/${id}`, {method: 'DELETE'});
  allItems = allItems.filter(i => i.id !== id);
  filterItems();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

loadSuppliers();
</script>
{% endblock %}
