{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Change Password</h1>
</div>
<div class="card" style="max-width:420px">
  {% if error %}
  <div class="error-banner" style="margin-bottom:16px">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="success-banner" style="margin-bottom:16px">{{ success }}</div>
  {% endif %}
  <form method="POST" style="display:flex;flex-direction:column;gap:14px">
    <div class="form-group">
      <label>Current Password</label>
      <input type="password" name="current_password" class="input" required autocomplete="current-password"/>
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input type="password" name="new_password" class="input" required minlength="6" autocomplete="new-password"/>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input type="password" name="confirm_password" class="input" required autocomplete="new-password"/>
    </div>
    <button type="submit" class="btn btn-primary">Update Password</button>
  </form>
</div>
{% endblock %}
